name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Check for new commits since last tag
        id: has_commits
        run: |
          LAST="${{ steps.latest_tag.outputs.tag }}"
          if [ "$LAST" = "v0.0.0" ]; then
            COUNT=$(git rev-list --count HEAD)
          else
            COUNT=$(git rev-list --count "${LAST}..HEAD")
          fi
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Skip if nothing to release
        if: steps.has_commits.outputs.count == '0'
        run: |
          echo "No new commits since ${{ steps.latest_tag.outputs.tag }} — skipping release."
          exit 0

      - name: Determine bump type from conventional commits
        id: bump_type
        if: steps.has_commits.outputs.count != '0' && github.event_name == 'push'
        run: |
          LAST="${{ steps.latest_tag.outputs.tag }}"
          if [ "$LAST" = "v0.0.0" ]; then
            LOG=$(git log --pretty=format:"%s")
          else
            LOG=$(git log "${LAST}..HEAD" --pretty=format:"%s")
          fi

          if echo "$LOG" | grep -qE '^(feat|fix|refactor|perf|style|docs|chore|ci|test)(\(.+\))?!:'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LOG" | grep -qE '^feat(\(.+\))?:'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Use manual bump type
        id: manual_bump
        if: steps.has_commits.outputs.count != '0' && github.event_name == 'workflow_dispatch'
        run: echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: next_version
        if: steps.has_commits.outputs.count != '0'
        run: |
          BUMP="${{ steps.bump_type.outputs.bump || steps.manual_bump.outputs.bump }}"
          CURRENT="${{ steps.latest_tag.outputs.tag }}"
          VERSION="${CURRENT#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        if: steps.has_commits.outputs.count != '0'
        run: |
          LAST="${{ steps.latest_tag.outputs.tag }}"
          if [ "$LAST" = "v0.0.0" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" | head -50)
          else
            NOTES=$(git log "${LAST}..HEAD" --pretty=format:"- %s (%h)")
          fi
          # Export multi-line value safely
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        if: steps.has_commits.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "${{ steps.changelog.outputs.notes }}"
